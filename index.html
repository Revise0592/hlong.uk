<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Larvs</title>
  <meta name="description" content="Personal portfolio of Larvs — building self-hosted tools." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #161616;
      --surface-2: #222222;
      --border:    #2d2d2d;
      --text:      #f0f0f0;
      --text-muted: #777777;
      --accent:    #f5c200;
      --accent-dark: #c9a000;
      --radius:    8px;
      --font: 'Inter', system-ui, sans-serif;
    }

    [data-theme="light"] {
      --bg:        #f7f7f5;
      --surface:   #ffffff;
      --surface-2: #f0f0ee;
      --border:    #e0e0dd;
      --text:      #111111;
      --text-muted: #6b6b6b;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Nav ─────────────────────────────────────── */

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    [data-theme="light"] nav {
      background: rgba(247, 247, 245, 0.85);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
    }

    .nav-name {
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Buttons ─────────────────────────────────── */

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
      line-height: 1;
      white-space: nowrap;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .btn-outline:hover {
      border-color: var(--text-muted);
      color: var(--text);
      background: var(--surface);
    }

    .theme-toggle {
      width: 34px;
      height: 34px;
      padding: 0;
      justify-content: center;
    }

    .theme-toggle svg { width: 15px; height: 15px; flex-shrink: 0; }

    .icon-moon { display: none; }
    [data-theme="light"] .icon-sun  { display: none; }
    [data-theme="light"] .icon-moon { display: block; }

    /* ── Main content ────────────────────────────── */

    .wrap {
      flex: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 4.5rem 2rem 6rem;
      width: 100%;
    }

    /* ── Profile ─────────────────────────────────── */

    .profile {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding-bottom: 2.75rem;
      margin-bottom: 2.75rem;
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .profile-info h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.2rem;
    }

    .profile-info .bio {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.875rem;
    }

    .profile-links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ── Section label ───────────────────────────── */

    .section-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    /* ── Project grid ────────────────────────────── */

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .card {
      background: var(--surface);
      padding: 1.375rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
      transition: background 0.15s;
    }

    .card:hover { background: var(--surface-2); }

    .card-top {
      display: flex;
      align-items: center;
      gap: 0.875rem;
    }

    .icon-wrap {
      width: 42px;
      height: 42px;
      border-radius: 9px;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: var(--surface-2);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .icon-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-name {
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: -0.015em;
      margin-bottom: 0.3rem;
    }

    .version-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border: 1px solid rgba(245, 194, 0, 0.3);
      border-radius: 100px;
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--accent);
    }

    .version-dot {
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.6;
      flex: 1;
    }

    /* ── Footer ──────────────────────────────────── */

    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    .footer-name {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--accent);
    }

    .footer-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── Responsive ──────────────────────────────── */

    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      .wrap { padding: 3rem 1rem 5rem; }
      .profile { flex-direction: column; align-items: flex-start; }
      .projects { grid-template-columns: 1fr; }
      footer { padding: 1.25rem 1rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="/">

    <div class="nav-right">

        </svg>

      <button class="btn btn-outline theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>

          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>

        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <div class="wrap">

    <div class="profile">
      <img class="avatar" src="https://avatars.githubusercontent.com/u/96446305?v=4" alt="Larvs" />
      <div class="profile-info">
        <h1>Larvs</h1>
        <p class="bio">Building self-hosted tools. United Kingdom.</p>
        <div class="profile-links">
          <a class="btn btn-outline" href="https://github.com/Revise0592" target="_blank" rel="noopener noreferrer">

            </svg>
            GitHub
          </a>
          <a class="btn btn-outline" id="bmc-btn" href="#" target="_blank" rel="noopener noreferrer" style="display:none">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M17 8h1a4 4 0 0 1 0 8h-1"/>
              <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z"/>
              <line x1="6" y1="2" x2="6" y2="4"/>

            </svg>

          </a>
        </div>
      </div>
    </div>

    <p class="section-label">Projects</p>

    <div class="projects">

      <article class="card">
        <div class="card-top">
          <div class="icon-wrap" id="carvey-icon">C</div>
          <div>
            <div class="card-name">Carvey</div>

              <span class="version-tag">—</span>
            </span>
          </div>
        </div>
        <p class="card-desc">Self-hosted car maintenance dashboard</p>
        <a class="btn btn-outline" style="width:fit-content" href="https://github.com/Revise0592/Carvey" target="_blank" rel="noopener noreferrer">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>

          <div>
            <div class="card-name">grained</div>

  </div>

  <footer>
    <div>
      <div class="footer-name">Larvs</div>
      <div class="footer-sub">hlong.uk</div>
    </div>
  </footer>

  <script>
    const GH = 'Revise0592';

    // Persist theme
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);

    function toggleTheme() {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }

    async function fetchVersion(repo, wrapperId) {
      const tag = document.querySelector(`#${wrapperId} .version-tag`);
      try {
        const res = await fetch(`https://api.github.com/repos/${GH}/${repo}/releases/latest`);
        if (!res.ok) { tag.textContent = '—'; return; }
        const { tag_name } = await res.json();
        tag.textContent = tag_name || '—';
      } catch { tag.textContent = '—'; }
    }

    async function fetchSocials() {
      try {
        const res = await fetch(`https://api.github.com/users/${GH}/social_accounts`);
        if (!res.ok) return;
        const accounts = await res.json();
        const bmc = accounts.find(a =>
          a.provider === 'buymeacoffee' || (a.url && a.url.includes('buymeacoffee'))
        );
        if (bmc?.url) {
          const btn = document.getElementById('bmc-btn');
          btn.href = bmc.url;
          btn.style.display = 'inline-flex';
        }
      } catch {}
    }

    async function tryLoadIcon(src, wrapId) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const wrap = document.getElementById(wrapId);
          wrap.textContent = '';
          wrap.style.background = 'transparent';
          wrap.appendChild(img);
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
          resolve(true);
        };
        img.onerror = () => resolve(false);
        img.src = src;
        img.alt = '';
      });
    }

    fetchVersion('Carvey', 'carvey-version');
    fetchVersion('grained', 'grained-version');
    fetchSocials();

    tryLoadIcon('https://carvey.app/apple-touch-icon.png', 'carvey-icon')
      .then(ok => !ok && tryLoadIcon('https://carvey.app/favicon.ico', 'carvey-icon'));
  </script>
