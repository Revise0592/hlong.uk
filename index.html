<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Larvs</title>
  <meta name="description" content="Personal portfolio of Larvs — building self-hosted tools." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f8f6f3;
      --surface: #ffffff;
      --border:  #e6e2dc;
      --text:    #1c1917;
      --muted:   #78716c;
      --subtle:  #a8a29e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5rem 1.5rem 7rem;
    }

    /* ── Header ─────────────────────────────────── */

    .header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .avatar {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      margin-bottom: 1.125rem;
      display: block;
      margin-inline: auto;
    }

    h1 {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.875rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      margin-bottom: 0.375rem;
    }

    .location {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      color: var(--subtle);
      font-size: 0.875rem;
      margin-bottom: 1.375rem;
    }

    .links {
      display: flex;
      gap: 0.625rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.8125rem;
      color: var(--muted);
      text-decoration: none;
      background: var(--surface);
      transition: color 0.15s, border-color 0.15s;
      line-height: 1;
    }

    .pill:hover {
      color: var(--text);
      border-color: #a8a29e;
    }

    .pill svg { flex-shrink: 0; }

    /* ── Project cards ───────────────────────────── */

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(288px, 1fr));
      gap: 1.125rem;
      width: 100%;
      max-width: 660px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.375rem 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s ease;
    }

    .card:hover {
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      margin-bottom: 0.875rem;
    }

    .icon-wrap {
      width: 46px;
      height: 46px;
      border-radius: 11px;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .icon-letter {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.125rem;
      font-weight: 600;
    }

    .icon-carvey  { background: #fdf4ec; color: #92592a; }
    .icon-grained { background: #edf2f8; color: #2a5992; }

    .card-meta { min-width: 0; }

    .card-name {
      font-family: 'Lora', Georgia, serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 0.3rem;
    }

    .version {
      display: inline-block;
      font-size: 0.6875rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--subtle);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
    }

    .card-desc {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
      margin-bottom: 1.125rem;
    }

    .gh-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.8125rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 7px;
      width: fit-content;
      background: var(--bg);
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .gh-btn:hover {
      color: var(--text);
      border-color: #a8a29e;
      background: var(--surface);
    }

    /* ── Footer ──────────────────────────────────── */

    footer {
      margin-top: 5rem;
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 0.8125rem;
      color: var(--border);
    }
  </style>
</head>

  <main class="projects">

  <footer>hlong.uk</footer>

  <script>
    const GH = 'Revise0592';

    async function fetchVersion(repo, elId) {
      try {
        const res = await fetch(`https://api.github.com/repos/${GH}/${repo}/releases/latest`);
        const el = document.getElementById(elId);
        if (!res.ok) { el.textContent = '—'; return; }
        const { tag_name } = await res.json();
        el.textContent = tag_name || '—';
      } catch { document.getElementById(elId).textContent = '—'; }
    }

    async function fetchSocials() {
      try {
        const res = await fetch(`https://api.github.com/users/${GH}/social_accounts`);
        if (!res.ok) return;
        const accounts = await res.json();
        const bmc = accounts.find(a =>
          a.provider === 'buymeacoffee' ||
          (a.url && a.url.includes('buymeacoffee'))
        );
        if (bmc?.url) {
          const pill = document.getElementById('bmc-pill');
          pill.href = bmc.url;
          pill.style.display = 'inline-flex';
        }
      } catch {}
    }

    async function tryLoadIcon(src, wrapId) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const wrap = document.getElementById(wrapId);
          wrap.innerHTML = '';
          wrap.style.background = 'transparent';
          wrap.style.border = '1px solid var(--border)';
          wrap.appendChild(img);
          resolve(true);
        };
        img.onerror = () => resolve(false);
        img.src = src;
        img.alt = '';
      });
    }

    fetchVersion('Carvey', 'carvey-version');
    fetchVersion('grained', 'grained-version');
    fetchSocials();

    tryLoadIcon('https://carvey.app/apple-touch-icon.png', 'carvey-icon')
      .then(ok => !ok && tryLoadIcon('https://carvey.app/favicon.ico', 'carvey-icon'));
  </script>
