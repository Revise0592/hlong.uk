<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Larvs</title>
  <meta name="description" content="Personal portfolio of Larvs — building self-hosted tools." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0c0e18;
      --surface:    #131520;
      --surface-2:  #1c1f2e;
      --border:     #272b3d;
      --text:       #e4e7f5;
      --muted:      #7880a8;
      --accent:     #4d7ef6;
      --accent-dim: rgba(77, 126, 246, 0.18);
      --radius:     8px;
      --font:       'Inter', system-ui, sans-serif;
    }

    [data-theme="light"] {
      --bg:         #f2f4fc;
      --surface:    #ffffff;
      --surface-2:  #e8eaf8;
      --border:     #cdd2ef;
      --text:       #0e1021;
      --muted:      #5d6490;
      --accent:     #3a6bef;
      --accent-dim: rgba(58, 107, 239, 0.1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Nav ─────────────────────────────────────── */

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: rgba(12, 14, 24, 0.8);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    [data-theme="light"] nav {
      background: rgba(242, 244, 252, 0.82);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .nav-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid var(--border);
    }

    .nav-name {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    /* ── Buttons ─────────────────────────────────── */

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 13px;
      border-radius: var(--radius);
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      line-height: 1;
      white-space: nowrap;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .btn-square {
      padding: 0;
      width: 32px;
      height: 32px;
      justify-content: center;
    }

    .btn-square svg { width: 14px; height: 14px; flex-shrink: 0; }

    .icon-moon { display: none; }
    [data-theme="light"] .icon-sun  { display: none; }
    [data-theme="light"] .icon-moon { display: block; }

    /* ── Wrap ────────────────────────────────────── */

    .wrap {
      flex: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
      width: 100%;
    }

    /* ── Profile ─────────────────────────────────── */

    .profile {
      display: flex;
      align-items: flex-start;
      gap: 1.125rem;
      margin-bottom: 3rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
    }

    .profile-info h1 {
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.2rem;
    }

    .bio {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 0.875rem;
      font-style: italic;
    }

    .profile-links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ── Section ─────────────────────────────────── */

    .section-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 0.875rem;
      opacity: 0.8;
    }

    /* ── Cards ───────────────────────────────────── */

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(272px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .card {
      background: var(--surface);
      padding: 1.375rem 1.375rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: background 0.15s;
    }

    .card:hover { background: var(--surface-2); }

    .card-top {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: var(--surface-2);
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--muted);
    }

    .icon-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-name {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 0.25rem;
    }

    .version-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 1px 7px;
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--muted);
      background: var(--surface-2);
    }

    .version-badge.loaded {
      border-color: rgba(77, 126, 246, 0.4);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .version-dot {
      width: 4px;
      height: 4px;
      background: currentColor;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card-desc {
      font-size: 0.8125rem;
      color: var(--muted);
      line-height: 1.65;
      flex: 1;
      font-style: italic;
    }

    /* ── Footer ──────────────────────────────────── */

    footer {
      border-top: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    .footer-name {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--accent);
      opacity: 0.8;
    }

    .footer-sub {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 2px;
      font-style: italic;
    }

    /* ── Responsive ──────────────────────────────── */

    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      .wrap { padding: 2.5rem 1rem 5rem; }
      .profile { flex-direction: column; }
      .projects { grid-template-columns: 1fr; }
      footer { padding: 1.25rem 1rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="/">
      <img class="nav-avatar" src="https://avatars.githubusercontent.com/u/96446305?v=4" alt="" />
      <span class="nav-name">Larvs</span>
    </a>
    <div class="nav-right">
      <a class="btn btn-ghost" href="https://github.com/Revise0592" target="_blank" rel="noopener noreferrer">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">

        </svg>
        GitHub
      </a>
      <button class="btn btn-ghost btn-square" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>

        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <div class="wrap">

    <div class="profile">
      <img class="avatar" src="https://avatars.githubusercontent.com/u/96446305?v=4" alt="Larvs" />
      <div class="profile-info">
        <h1>Larvs</h1>
        <p class="bio">Building self-hosted tools. United Kingdom.</p>
        <div class="profile-links">
          <a class="btn btn-ghost" href="https://github.com/Revise0592" target="_blank" rel="noopener noreferrer">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            GitHub
          </a>
          <a class="btn btn-ghost" id="bmc-btn" href="#" target="_blank" rel="noopener noreferrer" style="display:none">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M17 8h1a4 4 0 0 1 0 8h-1"/>
              <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z"/>
              <line x1="6" y1="2" x2="6" y2="4"/>
              <line x1="10" y1="2" x2="10" y2="4"/>
              <line x1="14" y1="2" x2="14" y2="4"/>
            </svg>
            Buy me a coffee
          </a>
        </div>
      </div>
    </div>

    <p class="section-label">Projects</p>

    <div class="projects">

      <article class="card">
        <div class="card-top">
          <div class="icon-wrap" id="carvey-icon">C</div>
          <div>
            <div class="card-name">Carvey</div>
            <span class="version-badge" id="carvey-version">
              <span class="version-dot"></span>
              <span class="version-tag">—</span>
            </span>
          </div>
        </div>
        <p class="card-desc">Self-hosted car maintenance dashboard</p>
        <a class="btn btn-ghost" style="width:fit-content" href="https://github.com/Revise0592/Carvey" target="_blank" rel="noopener noreferrer">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>

      <article class="card">
        <div class="card-top">
          <div class="icon-wrap" id="grained-icon">G</div>
          <div>
            <div class="card-name">grained</div>
            <span class="version-badge" id="grained-version">
              <span class="version-dot"></span>
              <span class="version-tag">—</span>
            </span>
          </div>
        </div>
        <p class="card-desc">A self-hosted archive for film photography.</p>
        <a class="btn btn-ghost" style="width:fit-content" href="https://github.com/Revise0592/grained" target="_blank" rel="noopener noreferrer">

            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>

  </div>

  <footer>
    <div>
      <div class="footer-name">Larvs</div>
      <div class="footer-sub">hlong.uk</div>
    </div>
  </footer>

  <script>
    const GH = 'Revise0592';

    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);

    function toggleTheme() {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }

    async function fetchVersion(repo, wrapperId) {
      const badge = document.getElementById(wrapperId);
      const tag   = badge.querySelector('.version-tag');
      try {
        const res = await fetch(`https://api.github.com/repos/${GH}/${repo}/releases/latest`);
        if (!res.ok) { tag.textContent = '—'; return; }
        const { tag_name } = await res.json();
        tag.textContent = tag_name || '—';
        if (tag_name) badge.classList.add('loaded');
      } catch { tag.textContent = '—'; }
    }

    async function fetchSocials() {
      try {
        const res = await fetch(`https://api.github.com/users/${GH}/social_accounts`);
        if (!res.ok) return;
        const accounts = await res.json();
        const bmc = accounts.find(a =>
          a.provider === 'buymeacoffee' || (a.url && a.url.includes('buymeacoffee'))
        );
        if (bmc?.url) {
          const btn = document.getElementById('bmc-btn');
          btn.href = bmc.url;
          btn.style.display = 'inline-flex';
        }
      } catch {}
    }

    async function tryLoadIcon(src, wrapId) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const wrap = document.getElementById(wrapId);
          wrap.textContent = '';
          wrap.style.background = 'transparent';
          wrap.appendChild(img);
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
          resolve(true);
        };
        img.onerror = () => resolve(false);
        img.src = src;
        img.alt = '';
      });
    }

    fetchVersion('Carvey', 'carvey-version');
    fetchVersion('grained', 'grained-version');
    fetchSocials();

    tryLoadIcon('https://carvey.app/apple-touch-icon.png', 'carvey-icon')
      .then(ok => !ok && tryLoadIcon('https://carvey.app/favicon.ico', 'carvey-icon'));
  </script>
